<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#ff8fcf'/>
      <stop offset='55%' stop-color='#8a7bff'/>
      <stop offset='100%' stop-color='#66d6ff'/>
    </linearGradient>
  </defs>
  <!-- 배경 둥근 사각형 -->
  <rect width='100' height='100' rx='22' fill='url(#bg)'/>
  <!-- 음표 -->
  <g fill='white' opacity='0.95'>
    <!-- 음표 머리 1 -->
    <ellipse cx='35' cy='68' rx='10' ry='7' transform='rotate(-15 35 68)'/>
    <!-- 음표 줄기 1 -->
    <rect x='44' y='30' width='4' height='38' rx='2'/>
    <!-- 음표 머리 2 -->
    <ellipse cx='62' cy='62' rx='10' ry='7' transform='rotate(-15 62 62)'/>
    <!-- 음표 줄기 2 -->
    <rect x='71' y='24' width='4' height='38' rx='2'/>
    <!-- 연결선 -->
    <rect x='44' y='30' width='31' height='5' rx='2.5'/>
  </g>
</svg>